<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lee County Property Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([26.6, -81.8], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
   fetchvar map = L.map('map').setView([26.6, -81.8], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var data = {
  "type": "FeatureCollection",
  "features": [
    {
      "type": "Feature",
      "properties": {"address": "123 Main St", "zipcode": "33904", "value": 250000},
      "geometry": {"type": "Point", "coordinates": [-81.87, 26.64]}
    },
    {
      "type": "Feature",
      "properties": {"address": "456 Oak Ave", "zipcode": "33904", "value": 350000},
      "geometry": {"type": "Point", "coordinates": [-81.88, 26.65]}
    },
    {
      "type": "Feature",
      "properties": {"address": "789 Pine Rd", "zipcode": "33905", "value": 420000},
      "geometry": {"type": "Point", "coordinates": [-81.86, 26.66]}
    }
  ]
};

L.geoJSON(data).addTo(map);
  .then(response => response.json())
  .then(data => {
    L.geoJSON(data).addTo(map);
  });
  </script>
</body>
</html>
